{% extends "layout/admin.html" %} {% block title %}Settings{% endblock %} {%
block admin_content %}
<h2>Settings</h2>

{% if saved %}
<p><ins>Settings saved.</ins></p>
{% endif %} {% if error %}
<p><mark>{{ error }}</mark></p>
{% endif %}

<form method="post" action="/admin/settings">
  <h3>Media Storage</h3>

  <label>
    Storage Backend
    <select
      name="storage_backend"
      id="storage-backend"
      onchange="
        document.getElementById('s3-fields').style.display =
          this.value === 's3' ? '' : 'none'
      "
    >
      <option
        value="local"
        {%
        if
        settings.storage_backend
        !="s3"
        %}selected{%
        endif
        %}
      >
        Local Disk
      </option>
      <option
        value="s3"
        {%
        if
        settings.storage_backend=""
        ="s3"
        %}selected{%
        endif
        %}
      >
        S3-Compatible
      </option>
    </select>
  </label>

  <div
    id="s3-fields"
    style="{% if settings.storage_backend != 's3' %}display:none;{% endif %}"
  >
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
      <label>
        Bucket
        <input
          type="text"
          name="s3_bucket"
          value="{{ settings.s3_bucket }}"
          placeholder="my-media-bucket"
        />
      </label>
      <label>
        Region
        <input
          type="text"
          name="s3_region"
          value="{{ settings.s3_region }}"
          placeholder="us-east-1"
        />
      </label>
    </div>

    <label>
      Endpoint URL
      <input
        type="url"
        name="s3_endpoint_url"
        value="{{ settings.s3_endpoint_url }}"
        placeholder="https://s3.amazonaws.com (leave blank for AWS default)"
      />
      <small class="meta"
        >Custom endpoint for MinIO, Cloudflare R2, or other S3-compatible
        providers.</small
      >
    </label>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
      <label>
        Access Key ID
        <input
          type="text"
          name="s3_access_key_id"
          value="{{ settings.s3_access_key_id }}"
          autocomplete="off"
        />
      </label>
      <label>
        Secret Access Key
        <input
          type="password"
          name="s3_secret_access_key"
          value="{{ settings.s3_secret_access_key }}"
          autocomplete="off"
        />
      </label>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
      <label>
        Key Prefix
        <input
          type="text"
          name="s3_prefix"
          value="{{ settings.s3_prefix }}"
          placeholder="uploads"
        />
        <small class="meta">Optional path prefix for all uploaded files.</small>
      </label>
      <label>
        Public URL Base
        <input
          type="url"
          name="s3_public_url"
          value="{{ settings.s3_public_url }}"
          placeholder="https://cdn.example.com"
        />
        <small class="meta"
          >If set, media URLs serve directly from this origin instead of
          proxying through the app.</small
        >
      </label>
    </div>
  </div>

  <h3>Site</h3>

  <label>
    Favicon
    <select name="favicon">
      <option value="">Default (built-in)</option>
      {% for file in media_files %}
      <option
        value="{{ file.filename }}"
        {%
        if
        settings.favicon=""
        ="file.filename"
        %}selected{%
        endif
        %}
      >
        {{ file.original_name }} ({{ file.filename }})
      </option>
      {% endfor %}
    </select>
    <small class="meta"
      >Select an uploaded image to use as the site favicon. Recommended: SVG,
      PNG, or ICO.</small
    >
  </label>

  <button type="submit">Save Settings</button>
</form>
{% endblock %}
