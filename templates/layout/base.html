<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        if (saved !== "light" && saved !== "dark") {
          saved = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.setAttribute("data-theme", saved);
      })();
    </script>
    <title>
      {% block title %}{{ title | default("garden cms", true) }}{% endblock %}
    </title>
    {# <link
      rel="stylesheet"
      href="{{ css_framework_url | default('https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css') }}"
    /> #}
    <link rel="icon" href="/favicon.ico" />
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@next" defer></script>
    {% block admin_head %}{{ extra_admin_head | default("<link
      rel=\"stylesheet\"
      href=\"https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css\"
    />", true) | safe }}{% endblock %}
    {% block head %}{{ extra_head | default("", true) }}{% endblock %}
  </head>
  <body>
    {% block body %}{% endblock %}
  </body>
</html>
