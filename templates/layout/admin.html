{% extends "layout/base.html" %} {% block title %}Admin{% endblock %} {% block
head %}
<style>
  .admin-layout {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 2rem;
    align-items: start;
  }
  .admin-sidebar nav ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .admin-sidebar nav ul li {
    margin-bottom: 0.25rem;
  }
  .admin-sidebar nav ul li a,
  .admin-sidebar .logout-form button {
    display: block;
    padding: 0.4rem 0.75rem;
    border-radius: var(--pico-border-radius);
    text-decoration: none;
    color: var(--pico-color);
    font-size: 0.9rem;
    transition: background 150ms ease;
  }
  .admin-sidebar nav ul li a:hover,
  .admin-sidebar .logout-form button:hover {
    background: var(--pico-card-background-color);
  }
  .admin-sidebar .logout-form {
    margin: 0;
  }
  .admin-sidebar .logout-form button {
    all: unset;
    display: block;
    width: 100%;
    cursor: pointer;
    box-sizing: border-box;
    padding: 0.4rem 0.75rem;
    border-radius: var(--pico-border-radius);
    font-size: 0.9rem;
  }

  /* htmx button spinner — any button with .btn-spinner shows a
     spinning indicator while htmx adds .htmx-request to it. */
  .btn-spinner {
    position: relative;
    min-width: 4.5rem;
    transition: opacity 150ms;
  }
  .btn-spinner.htmx-request {
    color: transparent;
    pointer-events: none;
  }
  .btn-spinner.htmx-request::after {
    content: "";
    position: absolute;
    inset: 0;
    margin: auto;
    width: 1rem;
    height: 1rem;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: btn-spin 0.6s linear infinite;
  }
  @keyframes btn-spin {
    to {
      transform: rotate(360deg);
    }
  }
</style>
{% endblock %} {% block body %}
<header>
  <nav>
    <ul>
      <li>
        <strong
          ><a href="/" style="text-decoration: none">&larr; site</a></strong
        >
      </li>
    </ul>
    <ul>
      <li><strong>admin</strong></li>
    </ul>
  </nav>
</header>
<main>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <nav>
        <ul>
          <li><a href="/admin">dashboard</a></li>
          <li><a href="/admin/pages">pages</a></li>
          <li><a href="/admin/content">content blocks</a></li>
          <li><a href="/admin/collections">collections</a></li>
          <li><a href="/admin/media">media</a></li>
          <li><a href="/admin/themes">themes</a></li>
          <li>
            <form method="post" action="/admin/logout" class="logout-form">
              <button type="submit">log out</button>
            </form>
          </li>
        </ul>
      </nav>
    </aside>
    <section>{% block admin_content %}{% endblock %}</section>
  </div>
</main>
{% endblock %}
