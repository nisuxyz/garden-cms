{% extends "layout/base.html" %} {% block title %}Admin{% endblock %} {% block
head %}
<style>
  /* Two-column admin layout */
  main {
    display: grid;
    grid-template-columns: 12rem 1fr;
    gap: 2rem;
    align-items: start;
  }

  /* Sidebar */
  aside nav ul {
    list-style: none;
    padding: 0;
  }
  aside nav li {
    margin-bottom: 0.25rem;
  }
  aside nav a,
  aside form button {
    all: unset;
    display: block;
    padding: 0.4rem 0.75rem;
    border-radius: var(--pico-border-radius);
    font-size: 0.9rem;
    cursor: pointer;
  }
  aside nav a:hover,
  aside form button:hover {
    background: var(--pico-card-background-color);
  }
  aside form {
    margin: 0;
  }

  /* Compact table controls */
  table button {
    padding: 0.25rem 0.5rem !important;
    font-size: 0.8rem !important;
  }
  table form {
    margin: 0;
  }

  /* Save + Delete footer row */
  article footer {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  /* HTMX request spinner */
  button.htmx-request {
    position: relative;
    color: transparent !important;
    pointer-events: none;
  }
  button.htmx-request::after {
    content: "";
    position: absolute;
    inset: 0;
    margin: auto;
    width: 1rem;
    height: 1rem;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }
</style>
{% endblock %} {% block body %}
<header>
  <nav>
    <ul>
      <li>
        <strong><a href="/">&larr; site</a></strong>
      </li>
    </ul>
    <ul>
      <li><strong>admin</strong></li>
    </ul>
  </nav>
</header>
<main>
  <aside>
    <nav>
      <ul>
        <li><a href="/admin">dashboard</a></li>
        <li><a href="/admin/pages">pages</a></li>
        <li><a href="/admin/content">content blocks</a></li>
        <li><a href="/admin/collections">collections</a></li>
        <li><a href="/admin/media">media</a></li>
        <li><a href="/admin/themes">themes</a></li>
        <li><a href="/admin/settings">settings</a></li>
        <li>
          <form method="post" action="/admin/logout">
            <button type="submit">log out</button>
          </form>
        </li>
      </ul>
    </nav>
  </aside>
  <section>{% block admin_content %}{% endblock %}</section>
</main>
{% endblock %}
