{% extends "layout/base.html" %} {% block title %}Admin Login{% endblock %} {%
block content %}
<article style="max-width: 400px; margin: 4rem auto">
  <header><h2>Admin</h2></header>
  {% if error %}
  <p><mark>{{ error }}</mark></p>
  {% endif %}
  <form method="post" action="/admin/login">
    <label>
      Username
      <input type="text" name="username" autocomplete="username" autofocus />
    </label>
    <label>
      Password
      <input
        type="password"
        name="password"
        autocomplete="current-password"
        required
      />
    </label>
    <small
      >Leave username blank to authenticate with the legacy env-var
      password.</small
    >
    <button type="submit">Log in</button>
  </form>
</article>
{% endblock %}
