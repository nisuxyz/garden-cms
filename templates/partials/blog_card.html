<article>
  <header>
    <a href="/blog/{{ post.slug }}"><strong>{{ post.title }}</strong></a>
    <span class="meta">{{ post.created_at[:10] if post.created_at else "" }}</span>
  </header>
  <p>{{ post.summary }}</p>
  {% if post.tags %}
  <footer>
    {% for tag in post.tags %}<span class="tag">{{ tag }}</span> {% endfor %}
  </footer>
  {% endif %}
</article>
